services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    volumes:
      - db_data:/app/data
    environment:
      - DB_PATH=/app/data/booking.db
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
